<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="google-site-verification" content="ynXQUQH43dRAFVs0KfqWtSZaECwuDFnvPJTBA1rJ4e0" />

  <title>Ortogon</title>

  <!-- Root page is only a language router: do not index it -->
  <meta name="robots" content="noindex,follow" />
  <meta name="googlebot" content="noindex,follow" />

  <!-- Hreflang signals -->
  <link rel="alternate" hreflang="en" href="https://www.ortogon.ch/en/" />
  <link rel="alternate" hreflang="fr" href="https://www.ortogon.ch/fr/" />
  <link rel="alternate" hreflang="x-default" href="https://www.ortogon.ch/" />

  <!-- Small UX: avoid a blank screen if redirect is delayed -->
  <style>
    :root { color-scheme: light; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.35;
      color: #111;
      background: #fff;
      display: grid;
      place-items: center;
      min-height: 100vh;
    }
    .wrap { max-width: 560px; padding: 28px; text-align: center; }
    .muted { color: #555; font-size: 14px; margin-top: 10px; }
    .links { margin-top: 18px; display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
    a { color: inherit; text-decoration: underline; text-underline-offset: 3px; }
  </style>

  <script>
    (function () {
      function go(path) {
        window.location.replace(path);
      }

      try {
        var langs = navigator.languages || [navigator.language || navigator.userLanguage || 'en'];
        var prefersFrench = Array.prototype.some.call(langs, function (l) {
          return String(l || '').toLowerCase().startsWith('fr');
        });

        go(prefersFrench ? '/fr/' : '/en/');
      } catch (e) {
        go('/en/');
      }
    })();
  </script>

  <noscript></noscript>
</head>

<body>
  <main class="wrap" role="main" aria-label="Language selection">
    <h1 style="margin:0; font-size:20px; font-weight:600;">Ortogon</h1>

    <p class="muted" style="margin-bottom:0;">
      Choose your language / Choisissez votre langue
    </p>

    <div class="links" aria-label="Language links">
      <a href="/en/">English</a>
      <a href="/fr/">Français</a>
    </div>

    <p class="muted">
      If you are not redirected automatically, use the links above.
    </p>
  </main>
</body>
</html>
